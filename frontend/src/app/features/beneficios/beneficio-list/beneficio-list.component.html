<mat-toolbar color="primary">
  <span>Benefícios</span>
  <span class="spacer"></span>
  <button mat-stroked-button (click)="abrirTransferencia()" class="toolbar-btn">
    <mat-icon>swap_horiz</mat-icon> Transferência
  </button>
  <button mat-flat-button (click)="abrirCriar()" class="toolbar-btn">
    <mat-icon>add</mat-icon> Novo
  </button>
</mat-toolbar>

<div class="container">
  @if (loading) {
    <div class="spinner-wrap">
      <mat-spinner diameter="48" />
    </div>
  } @else {
    <table mat-table [dataSource]="beneficios" class="mat-elevation-z2 full-width">

      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef>#</th>
        <td mat-cell *matCellDef="let b">{{ b.id }}</td>
      </ng-container>

      <ng-container matColumnDef="nome">
        <th mat-header-cell *matHeaderCellDef>Nome</th>
        <td mat-cell *matCellDef="let b">{{ b.nome }}</td>
      </ng-container>

      <ng-container matColumnDef="descricao">
        <th mat-header-cell *matHeaderCellDef>Descrição</th>
        <td mat-cell *matCellDef="let b">{{ b.descricao || '—' }}</td>
      </ng-container>

      <ng-container matColumnDef="valor">
        <th mat-header-cell *matHeaderCellDef>Valor</th>
        <td mat-cell *matCellDef="let b">{{ b.valor | currency:'BRL':'symbol':'1.2-2' }}</td>
      </ng-container>

      <ng-container matColumnDef="ativo">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let b">
          <mat-chip [class]="b.ativo ? 'chip-ativo' : 'chip-inativo'">
            {{ b.ativo ? 'Ativo' : 'Inativo' }}
          </mat-chip>
        </td>
      </ng-container>

      <ng-container matColumnDef="acoes">
        <th mat-header-cell *matHeaderCellDef>Ações</th>
        <td mat-cell *matCellDef="let b">
          <button mat-icon-button matTooltip="Editar" (click)="abrirEditar(b)">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button matTooltip="Inativar" color="warn" (click)="inativar(b)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell no-data" [attr.colspan]="displayedColumns.length">
          Nenhum benefício encontrado.
        </td>
      </tr>
    </table>
  }
</div>
